<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIライフコーチ</title>
<style>
  :root {
    --bg: #F4F1EA;
    --card: #FFFFFF;
    --accent: #6B8F71;
    --accent-dark: #57755D;
    --text: #3E3E3E;
    --text-light: #8A8A8A;
    --border: #E5E1D8;
    --bubble-ai: #FFFFFF;
    --bubble-user: #6B8F71;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .screen { height: 100%; display: flex; flex-direction: column; }
  .hidden { display: none !important; }

  /* ---- Login screen ---- */
  #loginScreen { align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    background: var(--card);
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    text-align: center;
  }
  .login-card h1 { font-size: 26px; margin: 0 0 6px; }
  .login-card .subtitle { color: var(--text-light); font-size: 14px; margin: 0 0 28px; line-height: 1.6; }
  .login-card label { display: block; text-align: left; font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
  .login-card input {
    width: 100%; padding: 12px 14px; font-size: 16px;
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 18px; background: #FAFAF8;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card button, .primary-btn {
    width: 100%; padding: 13px; font-size: 16px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; transition: background 0.15s;
  }
  .login-card button:active, .primary-btn:active { background: var(--accent-dark); }
  .login-error { color: #C0564B; font-size: 13px; margin: -8px 0 14px; text-align: left; }

  /* ---- Chat screen ---- */
  #chatScreen { background: var(--bg); }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header .user-name { font-size: 12px; color: var(--text-light); }
  header button.logout {
    background: none; border: 1px solid var(--border); color: var(--text-light);
    font-size: 12px; padding: 7px 12px; border-radius: 8px; cursor: pointer;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .msg-row { display: flex; max-width: 100%; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.model { justify-content: flex-start; }
  .bubble {
    max-width: 78%; padding: 11px 15px; border-radius: 16px;
    font-size: 15px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
  }
  .msg-row.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
  .msg-row.model .bubble { background: var(--bubble-ai); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .ai-icon {
    width: 30px; height: 30px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; margin-right: 8px; flex-shrink: 0; color: #fff;
  }
  .msg-row.model { align-items: flex-start; }

  #typingIndicator {
    padding: 0 16px 8px; font-size: 13px; color: var(--text-light);
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-light); animation: blink 1.4s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }

  .input-bar {
    display: flex; gap: 8px; padding: 12px; background: var(--card);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .input-bar textarea {
    flex: 1; resize: none; border: 1px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font-size: 16px; font-family: inherit; max-height: 110px;
    background: #FAFAF8;
  }
  .input-bar textarea:focus { outline: none; border-color: var(--accent); }
  .input-bar button {
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 0 20px; font-size: 15px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  }
  .input-bar button:disabled { background: var(--border); color: var(--text-light); }

  .error-banner {
    background: #FBEAE7; color: #C0564B; font-size: 13px; padding: 10px 16px;
    border-bottom: 1px solid #F3D6D1;
  }
</style>
</head>
<body>

  <!-- Login screen -->
  <div id="loginScreen" class="screen">
    <div class="login-card">
      <h1>🌱 AIライフコーチ</h1>
      <p class="subtitle">人生を変えるための一歩を、対話しながら一緒に考えます。<br>まずはお名前を教えてください。</p>
      <label for="loginName">お名前</label>
      <input type="text" id="loginName" placeholder="例: たかせ まさ" autocomplete="off">
      <div id="loginError" class="login-error hidden"></div>
      <button onclick="login()">はじめる</button>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chatScreen" class="screen hidden">
    <header>
      <div class="title">🌱 AIライフコーチ <span class="user-name" id="headerUserName"></span></div>
      <button class="logout" onclick="logout()">ログアウト</button>
    </header>
    <div id="errorBanner" class="error-banner hidden"></div>
    <div id="messages"></div>
    <div id="typingIndicator" class="hidden">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span> AIコーチが入力中...
    </div>
    <div class="input-bar">
      <textarea id="messageInput" rows="1" placeholder="今の気持ちや相談したいことを入力..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">送信</button>
    </div>
  </div>

<script>
  // ====== 設定 ======
  const API_URL = "https://script.google.com/macros/s/AKfycbwi_ve2TvhxGNkOTG3uMTOtcF0BZD1biVturodQIYSQk1OiikQN9H3a5wm_5Gp8foSFBw/exec";

  // ====== 状態 ======
  let currentUser = null; // {userId, name}
  let sending = false;

  const WELCOME_MESSAGE = "こんにちは。私はあなたの変化を一緒に考えるAIライフコーチです。\n今、心の中にあること——悩みでも、漠然としたモヤモヤでも、叶えたいことでも——何でも話してみてください。";

  // ====== JSONP ヘルパー ======
  function jsonpRequest(action, payload) {
    return new Promise((resolve, reject) => {
      const cbName = "cb_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");
      let params = "callback=" + cbName;
      if (action) params += "&action=" + encodeURIComponent(action);
      if (payload) params += "&payload=" + encodeURIComponent(JSON.stringify(payload));
      script.src = API_URL + "?" + params;

      const cleanup = () => {
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
        clearTimeout(timer);
      };
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error("タイムアウトしました。通信環境を確認して再度お試しください。"));
      }, 30000);

      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error("通信エラーが発生しました。")); };
      document.body.appendChild(script);
    });
  }

  // ====== ログイン ======
  function login() {
    const name = document.getElementById("loginName").value.trim();
    const errEl = document.getElementById("loginError");
    errEl.classList.add("hidden");
    if (!name) {
      errEl.textContent = "お名前を入力してください。";
      errEl.classList.remove("hidden");
      return;
    }
    jsonpRequest("login", { name }).then((res) => {
      if (res.error) {
        errEl.textContent = res.error;
        errEl.classList.remove("hidden");
        return;
      }
      currentUser = { userId: res.userId, name: res.name };
      localStorage.setItem("aiCoachUser", JSON.stringify(currentUser));
      showChat();
    }).catch((err) => {
      errEl.textContent = err.message;
      errEl.classList.remove("hidden");
    });
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem("aiCoachUser");
    document.getElementById("messages").innerHTML = "";
    document.getElementById("chatScreen").classList.add("hidden");
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("loginName").value = "";
  }

  function showChat() {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("chatScreen").classList.remove("hidden");
    document.getElementById("headerUserName").textContent = "(" + currentUser.name + ")";
    loadHistory();
  }

  // ====== 履歴読み込み ======
  function loadHistory() {
    jsonpRequest("getHistory", { userId: currentUser.userId }).then((res) => {
      if (res.error) {
        showError(res.error);
        return;
      }
      const messages = res.messages || [];
      const container = document.getElementById("messages");
      container.innerHTML = "";
      if (messages.length === 0) {
        appendBubble("model", WELCOME_MESSAGE);
      } else {
        messages.forEach((m) => appendBubble(m.role, m.content));
      }
      scrollToBottom();
    }).catch((err) => showError(err.message));
  }

  // ====== メッセージ送信 ======
  function sendMessage() {
    if (sending) return;
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text) return;

    hideError();
    appendBubble("user", text);
    input.value = "";
    autoResize(input);
    scrollToBottom();

    sending = true;
    document.getElementById("sendBtn").disabled = true;
    document.getElementById("typingIndicator").classList.remove("hidden");
    scrollToBottom();

    jsonpRequest("sendMessage", { userId: currentUser.userId, message: text }).then((res) => {
      document.getElementById("typingIndicator").classList.add("hidden");
      sending = false;
      document.getElementById("sendBtn").disabled = false;
      if (res.error) {
        showError(res.error);
        return;
      }
      appendBubble("model", res.reply);
      scrollToBottom();
    }).catch((err) => {
      document.getElementById("typingIndicator").classList.add("hidden");
      sending = false;
      document.getElementById("sendBtn").disabled = false;
      showError(err.message);
    });
  }

  // ====== 表示ヘルパー ======
  function appendBubble(role, content) {
    const container = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg-row " + (role === "user" ? "user" : "model");
    if (role !== "user") {
      const icon = document.createElement("div");
      icon.className = "ai-icon";
      icon.textContent = "🌱";
      row.appendChild(icon);
    }
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    row.appendChild(bubble);
    container.appendChild(row);
  }

  function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
  }

  function showError(msg) {
    const el = document.getElementById("errorBanner");
    el.textContent = "⚠ " + msg;
    el.classList.remove("hidden");
  }
  function hideError() {
    document.getElementById("errorBanner").classList.add("hidden");
  }

  // ====== 入力欄の自動リサイズ & Enter送信 ======
  const messageInput = document.getElementById("messageInput");
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 110) + "px";
  }
  messageInput.addEventListener("input", () => autoResize(messageInput));
  messageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  document.getElementById("loginName").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); login(); }
  });

  // ====== 初期化 ======
  window.addEventListener("load", () => {
    const saved = localStorage.getItem("aiCoachUser");
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        showChat();
      } catch (e) {
        localStorage.removeItem("aiCoachUser");
      }
    }
  });
</script>
</body>
</html>
